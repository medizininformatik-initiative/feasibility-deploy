services:
  dataportal-ui:
    image: ghcr.io/medizininformatik-initiative/feasibility-gui:2.2.0
    ports:
    - "80:80"
    restart: unless-stopped
    volumes:
      - ${FEASIBILITY_GUI_CONFIG_FILE:-./nginx.conf}:/etc/nginx/nginx.conf:ro
      - ${FEASIBILITY_GUI_DEPLOY_CONFIG_FILE:-./deploy-config.json}:/usr/share/nginx/html/assets/config/config.deploy.json
      - ${FEASIBILITY_GUI_I18N_GERMAN_FILE:-./language/de.json}:/usr/share/nginx/html/assets/i18n/de.json
      - ${FEASIBILITY_GUI_I18N_ENGLISH_FILE:-./language/en.json}:/usr/share/nginx/html/assets/i18n/en.json
