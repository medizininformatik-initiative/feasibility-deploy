version: '3.7'

services:

  # ---- Proxy ----------------------------------------------------------------
  dsf-dic-fhir-proxy:
    image: nginx:1.25.1
    restart: on-failure
    secrets:
    - proxy_certificate_and_int_cas.pem
    - proxy_certificate_private_key.pem
    - proxy_trusted_client_cas.pem
    volumes:
    - type: bind
      source: ./proxy/nginx.conf
      target: /etc/nginx/nginx.conf
      read_only: true
    environment:
      TZ: Europe/Berlin
    depends_on:
      - dsf-dic-fhir-app

  dsf-dic-fhir-app:
    image: ghcr.io/datasharingframework/fhir:1.5.0
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "./healthcheck.sh" ]
      interval: 10s
      timeout: 15s
      retries: 5
    volumes:
      - type: bind
        source: ${FEASIBILITY_DSF_FHIR_LOG_FOLDER_PATH:-./fhir/log}
        target: /opt/fhir/log
    secrets:
    - db_liquibase.password
    - db_fhir_dic_1_user.password
    - db_fhir_dic_1_user_permanent_delete.password
    - app_client_trust_certificates.pem
    - app_dic_1_client_certificate.pem
    - app_dic_1_client_certificate_private_key.pem
    #- app_client_certificate_private_key.pem.password
    environment:
      DEV_DSF_SERVER_AUTH_TRUST_CLIENT_CERTIFICATE_CAS: /run/secrets/app_client_trust_certificates.pem
      DEV_DSF_FHIR_DB_LIQUIBASE_PASSWORD_FILE: /run/secrets/db_liquibase.password
      DEV_DSF_FHIR_DB_USER_PASSWORD_FILE: /run/secrets/db_fhir_dic_1_user.password
      DEV_DSF_FHIR_DB_USER_PERMANENT_DELETE_PASSWORD_FILE: /run/secrets/db_fhir_dic_1_user_permanent_delete.password
      DEV_DSF_FHIR_CLIENT_TRUST_SERVER_CERTIFICATE_CAS: /run/secrets/app_client_trust_certificates.pem
      DEV_DSF_FHIR_CLIENT_CERTIFICATE: /run/secrets/app_dic_1_client_certificate.pem
      DEV_DSF_FHIR_CLIENT_CERTIFICATE_PRIVATE_KEY: /run/secrets/app_dic_1_client_certificate_private_key.pem
      #DEV_DSF_FHIR_CLIENT_CERTIFICATE_PRIVATE_KEY_PASSWORD_FILE: /run/secrets/app_client_certificate_private_key.pem.password
      DEV_DSF_FHIR_DB_URL: jdbc:postgresql://dsf-dic-fhir-db/fhir
      DEV_DSF_FHIR_DB_USER_GROUP: dic_1_fhir_users
      DEV_DSF_FHIR_DB_USER_USERNAME: dic_1_fhir_server_user
      DEV_DSF_FHIR_DB_USER_PERMANENT_DELETE_GROUP: dic_1_fhir_permanent_delete_users
      DEV_DSF_FHIR_DB_USER_PERMANENT_DELETE_USERNAME: dic_1_fhir_server_permanent_delete_user
      DEV_DSF_FHIR_SERVER_BASE_URL: ${FEASIBILITY_DSF_FHIR_SERVER_BASE_URL:-https://dsf-dic-fhir-proxy/fhir}
      DEV_DSF_FHIR_SERVER_ORGANIZATION_IDENTIFIER_VALUE: ${FEASIBILITY_DSF_CLIENT_PROCESS_ORGANIZATION_IDENTIFIER}
      DEV_DSF_FHIR_SERVER_ORGANIZATION_THUMBPRINT: ${FEASIBILITY_DSF_FHIR_ORGANIZATION_THUMBPRINT}
      DEV_DSF_FHIR_SERVER_ROLECONFIG: |
        - webbrowser_test_user:
            thumbprint: ${FEASIBILITY_DSF_FHIR_USER_THUMBPRINT}
            token-role: admin
            dsf-role:
              - CREATE
              - READ
              - UPDATE
              - DELETE
              - SEARCH
              - HISTORY
              - PERMANENT_DELETE
              - WEBSOCKET
            practitioner-role:
              - http://dsf.dev/fhir/CodeSystem/practitioner-role|DSF_ADMIN
      EXTRA_JVM_ARGS: ${FEASIBILITY_DSF_FHIR_APP_JVM_ARGS}
      TZ: Europe/Berlin
    depends_on:
    - dsf-dic-fhir-db

  dsf-dic-fhir-db:
    image: postgres:15
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U liquibase_user -d fhir" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_liquibase.password
      POSTGRES_USER: liquibase_user
      POSTGRES_DB: fhir
    volumes:
    - type: volume
      source: dsf-dic-fhir-db-data
      target: /var/lib/postgresql/data
    secrets:
    - db_liquibase.password

  dsf-dic-bpe-app:
    image: ghcr.io/datasharingframework/bpe:1.5.0
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "./healthcheck.sh" ]
      interval: 10s
      timeout: 15s
      retries: 5
    volumes:
      - type: bind
        source: ${FEASIBILITY_DSF_BPE_PROCESS_PLUGINS_DIRECTORY_PATH:-./process}
        target: /opt/bpe/process
        read_only: true
      - type: bind
        source: ${FEASIBILITY_DSF_BPE_LOG_FOLDER_PATH:-./bpe/log}
        target: /opt/bpe/log
      - type: bind
        source: ${FEASIBILITY_DSF_BPE_LAST_EVENT_FOLDER_PATH:-./bpe/last_event}
        target: /opt/bpe/last_event
      - type: bind
        source: ${FEASIBILITY_DSF_BPE_CACHE_FOLDER_PATH:-./bpe/cache}
        target: /opt/bpe/cache
      # Use the following settings if you need to.
      # - type: bind
      #   source: <PATH_TO_TRUST_STORE>
      #   target: ${DSF_CLIENT_PROCESS_TRUST_STORE_PATH}
      #   read_only: true
      # - type: bind
      #   source: <PATH_TO_KEY_STORE>
      #   target: ${DSF_CLIENT_PROCESS_KEY_STORE_PATH}
      #   read_only: true
    secrets:
    - db_liquibase.password
    - db_dic_1_bpe_user.password
    - db_dic_1_bpe_user_camunda.password
    - app_client_trust_certificates.pem
    - app_dic_1_client_certificate.pem
    - app_dic_1_client_certificate_private_key.pem
    #- app_client_certificate_private_key.pem.password
    environment:
      DEV_DSF_SERVER_AUTH_TRUST_CLIENT_CERTIFICATE_CAS: /run/secrets/app_client_trust_certificates.pem
      DEV_DSF_BPE_DB_LIQUIBASE_PASSWORD_FILE: /run/secrets/db_liquibase.password
      DEV_DSF_BPE_DB_USER_PASSWORD_FILE: /run/secrets/db_dic_1_bpe_user.password
      DEV_DSF_BPE_DB_USER_CAMUNDA_PASSWORD_FILE: /run/secrets/db_dic_1_bpe_user_camunda.password
      DEV_DSF_BPE_FHIR_CLIENT_TRUST_SERVER_CERTIFICATE_CAS: /run/secrets/app_client_trust_certificates.pem
      DEV_DSF_BPE_FHIR_CLIENT_CERTIFICATE: /run/secrets/app_dic_1_client_certificate.pem
      DEV_DSF_BPE_FHIR_CLIENT_CERTIFICATE_PRIVATE_KEY: /run/secrets/app_dic_1_client_certificate_private_key.pem
      #DEV_DSF_BPE_FHIR_CLIENT_CERTIFICATE_PRIVATE_KEY_PASSWORD_FILE: /run/secrets/app_client_certificate_private_key.pem.password
      DEV_DSF_BPE_DB_URL: jdbc:postgresql://dsf-dic-bpe-db/bpe
      DEV_DSF_BPE_DB_USER_GROUP: dic_1_bpe_users
      DEV_DSF_BPE_DB_USER_USERNAME: dic_1_bpe_server_user
      DEV_DSF_BPE_DB_USER_CAMUNDA_GROUP: dic_1_camunda_users
      DEV_DSF_BPE_DB_USER_CAMUNDA_USERNAME: dic_1_camunda_server_user
      DEV_DSF_BPE_FHIR_SERVER_BASE_URL: ${FEASIBILITY_DSF_FHIR_SERVER_BASE_URL:-https://dsf-dic-fhir-proxy/fhir}
      DEV_DSF_BPE_PROCESS_EXCLUDED: ${FEASIBILITY_DSF_BPE_PROCESS_EXCLUDED}
      DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_FLARE_BASE_URL: ${FEASIBILITY_DSF_CLIENT_PROCESS_FLARE_BASE_URL}
      DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_FLARE_CONNECT_TIMEOUT: 2000
      DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_EVALUATION_STRATEGY: ${FEASIBILITY_DSF_CLIENT_PROCESS_EVALUATION_STRATEGY}
      DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_EVALUATION_OBFUSCATE: ${FEASIBILITY_DSF_CLIENT_PROCESS_EVALUATION_OBFUSCATE}
      DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_BASE_URL: ${FEASIBILITY_DSF_CLIENT_PROCESS_FHIR_SERVER_BASE_URL}
      # Use the following settings if you need to.
      # For more information see: https://github.com/medizininformatik-initiative/feasibility-dsf-process/tree/develop/feasibility-dsf-process#configuration
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_PROXY_HOST: ${FEASIBILITY_DSF_CLIENT_PROCESS_FORWARD_PROXY_HOST}
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_PROXY_PORT: ${FEASIBILITY_DSF_CLIENT_PROCESS_FORWARD_PROXY_PORT}
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_PROXY_USERNAME: ${FEASIBILITY_DSF_CLIENT_PROCESS_FORWARD_PROXY_USERNAME}
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_PROXY_PASSWORD: ${FEASIBILITY_DSF_CLIENT_PROCESS_FORWARD_PROXY_PASSWORD}
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_AUTH_BEARER_TOKEN: ${FEASIBILITY_DSF_CLIENT_PROCESS_FHIR_SERVER_BEARER_AUTH_TOKEN}
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_AUTH_BASIC_USERNAME: ${FEASIBILITY_DSF_CLIENT_PROCESS_FHIR_SERVER_BASIC_AUTH_USERNAME}
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_AUTH_BASIC_PASSWORD: ${FEASIBILITY_DSF_CLIENT_PROCESS_FHIR_SERVER_BASIC_AUTH_PASSWORD}
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_TIMEOUT_CONNECT: ${FEASIBILITY_DSF_CLIENT_PROCESS_FHIR_SERVER_CONNECTION_TIMEOUT}
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_TIMEOUT_CONNECT_REQUEST: ${FEASIBILITY_DSF_CLIENT_PROCESS_FHIR_SERVER_CONNECTION_REQUEST_TIMEOUT}
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_TIMEOUT_SOCKET: ${FEASIBILITY_DSF_CLIENT_PROCESS_FHIR_SERVER_NETWORK_OPS_TIMEOUT}
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_TRUST_STORE_PATH: ${FEASIBILITY_DSF_CLIENT_PROCESS_TRUST_STORE_PATH}
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_TRUST_STORE_PASSWORD: ${FEASIBILITY_DSF_CLIENT_PROCESS_TRUST_STORE_PASSWORD}
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_KEY_STORE_PATH: ${FEASIBILITY_DSF_CLIENT_PROCESS_KEY_STORE_PATH}
      # DE_MEDIZININFORMATIK_INITIATIVE_FEASIBILITY_DSF_PROCESS_CLIENT_STORE_KEY_STORE_PASSWORD: ${FEASIBILITY_DSF_CLIENT_PROCESS_KEY_STORE_PASSWORD}
      # Report Process
      DE_MEDIZININFORMATIK_INITIATIVE_REPORT_DIC_FHIR_SERVER_BASE_URL: ${FEASIBILITY_DSF_CLIENT_PROCESS_FHIR_SERVER_BASE_URL}
      DE_MEDIZININFORMATIK_INITIATIVE_REPORT_DIC_FHIR_DATALOGGINGENABLED: "false"
      DE_MEDIZININFORMATIK_INITIATIVE_REPORT_DIC_FHIR_SERVER_TRUST_CERTIFICATES:

      EXTRA_JVM_ARGS: ${CODEX_DSF_ZARS_BPE_APP_JVM_ARGS}
      TZ: "Europe/Berlin"
    depends_on:
    - dsf-dic-fhir-proxy
    - dsf-dic-bpe-db

  dsf-dic-bpe-db:
    image: postgres:15
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U liquibase_user -d bpe" ]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/db_liquibase.password
      POSTGRES_USER: liquibase_user
      POSTGRES_DB: bpe
    volumes:
    - type: volume
      source: dsf-dic-bpe-db-data
      target: /var/lib/postgresql/data
    secrets:
    - db_liquibase.password

secrets:
  proxy_certificate_and_int_cas.pem:
    file: ${FEASIBILITY_DSF_PROXY_CERTIFICATE_AND_INTERMEDIATE_CAS_FILE:-../../secrets/proxy_certificate_and_int_cas.pem}
  proxy_certificate_private_key.pem:
    file: ${FEASIBILITY_DSF_PROXY_CERTIFICATE_PRIVATE_KEY_FILE:-../../secrets/proxy_certificate_private_key.pem}
  proxy_trusted_client_cas.pem:
    file: ${FEASIBILITY_DSF_PROXY_TRUSTED_CLIENT_CAS_FILE:-../../secrets/proxy_trusted_client_cas.pem}

  app_client_trust_certificates.pem:
    file: ${FEASIBILITY_DSF_CLIENT_TRUST_CERTIFICATES_FILE:-../../secrets/app_client_trust_certificates.pem}
  #app_client_certificate_private_key.pem.password:
  #  file: ${FEASIBILITY_DSF_CLIENT_CERTIFICATE_PRIVATE_KEY_PASSWORD_FILE:-../../secrets/app_client_certificate_private_key.pem.password}

  db_liquibase.password:
    file: ${FEASIBILITY_DSF_DB_LIQUIBASE_PASSWORD_FILE:-../../secrets/db_liquibase.password}

  db_dic_1_bpe_user.password:
    file: ${FEASIBILITY_DSF_BPE_DB_USER_PASSWORD_FILE:-../../secrets/db_dic_1_bpe_user.password}
  db_dic_1_bpe_user_camunda.password:
    file: ${FEASIBILITY_DSF_BPE_DB_USER_CAMUNDA_PASSWORD_FILE:-../../secrets/db_dic_1_bpe_user_camunda.password}
  app_dic_1_client_certificate.pem:
    file: ${FEASIBILITY_DSF_CLIENT_CERTIFICATE_FILE:-../../secrets/app_dic_1_client_certificate.pem}
  app_dic_1_client_certificate_private_key.pem:
    file: ${FEASIBILITY_DSF_CLIENT_CERTIFICATE_PRIVATE_KEY_FILE:-../../secrets/app_dic_1_client_certificate_private_key.pem}
  db_fhir_dic_1_user.password:
    file: ${FEASIBILITY_DSF_FHIR_DB_USER_PASSWORD_FILE:-../../secrets/db_fhir_dic_1_user.password}
  db_fhir_dic_1_user_permanent_delete.password:
    file: ${FEASIBILITY_DSF_FHIR_DB_USER_PERMANENT_DELETE_PASSWORD_FILE:-../../secrets/db_fhir_dic_1_user_permanent_delete.password}

volumes:
  dsf-dic-fhir-db-data:
    name: "dsf-dic-fhir-db-data"
  dsf-dic-bpe-db-data:
    name: "dsf-dic-bpe-db-data"
